<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPE Helper Judge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="canvas-noise"></div>

  <header class="topbar">
    <div class="brand-block">
      <div class="brand-mark">G</div>
      <div>
        <h1>GPE Helper Judge</h1>
        <p>Pure Frontend Judge (Browser-side WASM)</p>
      </div>
    </div>

    <div class="topbar-right">
      <div class="status-pill" id="serverStatus">連線檢查中...</div>
      <button id="toggleProblemPanelBtn" class="ghost-btn mobile-only" type="button">題目清單</button>
    </div>
  </header>

  <main class="workspace">
    <aside class="problem-sidebar" id="problemSidebar">
      <div class="sidebar-head">
        <h2>Problems</h2>
        <input id="problemSearch" type="text" placeholder="搜尋 pid / 題名">
      </div>
      <div id="problemList" class="problem-list"></div>
    </aside>

    <section class="main-area">
      <article class="panel statement-panel">
        <div class="panel-head">
          <div>
            <h2 id="selectedProblemTitle">請選擇題目</h2>
            <p id="selectedProblemMeta">-</p>
          </div>
          <button id="problemLink" class="problem-link-btn" type="button" disabled>查看原題</button>
        </div>

        <div class="panel-body">
          <p id="problemDescription" class="problem-description">請先選擇題目。</p>
          <div id="sampleList" class="sample-list"></div>
        </div>
      </article>

      <article class="panel editor-panel">
        <div class="panel-head controls-row">
          <div class="lang-picker">
            <label for="languageSelect">Language</label>
            <select id="languageSelect">
              <option value="cpp14">C++14</option>
              <option value="python39">Python3.9</option>
            </select>
          </div>

          <div class="editor-actions">
            <span class="hint">Tab: 縮排 / Shift+Tab: 反縮排</span>
            <span id="draftStatus" class="draft-status">草稿未儲存</span>
            <button id="resetBtn" class="secondary-btn" type="button">Reset 範本</button>
            <button id="runBtn" class="run-btn">送出批改</button>
          </div>
        </div>

        <div class="editor-wrap">
          <textarea id="codeEditor" class="code-editor" spellcheck="false" placeholder="請在此輸入程式碼"></textarea>
        </div>
      </article>

      <article class="panel result-panel">
        <div class="panel-head result-head">
          <h3>批改結果</h3>
          <span id="summaryBadge" class="summary neutral">尚未送出</span>
        </div>
        <div id="resultBody" class="result-body">
          <p class="placeholder">選題後貼上程式碼，按下「送出批改」。草稿自動儲存於瀏覽器，清除瀏覽資料或換裝置後將遺失。</p>
        </div>
      </article>
    </section>
  </main>

  <template id="problemItemTpl">
    <button class="problem-item">
      <span class="pid"></span>
      <span class="name"></span>
      <span class="tests"></span>
    </button>
  </template>

  <template id="sampleItemTpl">
    <button class="sample-trigger" type="button">
      <span class="sample-trigger-name"></span>
    </button>
  </template>

  <div id="problemModal" class="problem-modal" aria-hidden="true">
    <div id="problemModalBackdrop" class="problem-modal-backdrop"></div>
    <section class="problem-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="problemModalTitle">
      <div class="problem-modal-head">
        <h3 id="problemModalTitle">題目內容</h3>
        <button id="problemModalCloseBtn" class="ghost-btn problem-modal-close" type="button">關閉</button>
      </div>
      <div id="problemModalBody" class="problem-modal-body">
        <p class="placeholder">載入中...</p>
      </div>
    </section>
  </div>

  <div id="sampleModal" class="sample-modal" aria-hidden="true">
    <div id="sampleModalBackdrop" class="sample-modal-backdrop"></div>
    <section class="sample-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="sampleModalTitle">
      <div class="sample-modal-head">
        <h3 id="sampleModalTitle">範例測資</h3>
        <button id="sampleModalCloseBtn" class="ghost-btn sample-modal-close" type="button">關閉</button>
      </div>
      <div class="sample-modal-body">
        <div class="sample-cols">
          <div>
            <h4>Input</h4>
            <pre id="sampleModalInput" class="sample-modal-pre"></pre>
          </div>
          <div>
            <h4>Output</h4>
            <pre id="sampleModalOutput" class="sample-modal-pre"></pre>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="./app.js" defer></script>
</body>
</html>
